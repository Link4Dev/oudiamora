site_name: Oudiamora, la puissance de l'IA & Open Data au service des communautés 
site_description: Accompagner l'inclusion sociale par le numérique local.
theme:
  name: material
  logo: images/logo.jpg  # On ajoute "images/" devant le nom du fichier
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - search.suggest
    - search.highlight
nav:
  - Accueil: index.md
  - Les Concepts Clés (Lexique): definitions.md
  - La Puissance de la Synergie Open data + IA: combinaison-puissance.md
  - OSC Pilotes:
      - Membres: membres.md
      - Devenir membre: devenir-membre.md
  - À propos de l'initiateur: initiateur.md
